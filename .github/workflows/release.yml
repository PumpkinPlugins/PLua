name: Create Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build wasm32-wasip2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm32-wasip2-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Build
        run: cargo build --release --target wasm32-wasip2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plua.wasm
          path: target/wasm32-wasip2/release/plua.wasm
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: plua.wasm
          path: release-assets

      - name: Extract tag name
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: PLua ${{ steps.tag.outputs.VERSION }}
          draft: false
          prerelease: false
          files: release-assets/plua.wasm
          body: |
            ## PLua ${{ steps.tag.outputs.VERSION }}

            Lua plugin system for Pumpkin Minecraft server.

            ### Install

            Place `plua.wasm` in your Pumpkin server's plugins directory.
